<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loadout — Game Release Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F1117; color: #E8EAF0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F1117; }
    ::-webkit-scrollbar-thumb { background: #252A3A; border-radius: 3px; }
    .bebas { font-family: 'Bebas Neue', sans-serif; }
    .mono  { font-family: 'JetBrains Mono', monospace; }
    .game-card { background: #1C2030; border: 1px solid transparent; border-radius: 8px; padding: 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.15s; position: relative; overflow: hidden; margin-bottom: 10px; }
    .game-card:hover { border-color: #7A6340; background: #252A3A; transform: translateX(3px); }
    .game-card.logged { border-color: #7A6340; }
    .game-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#C8A96E; opacity:0; transition:opacity 0.15s; }
    .game-card:hover::before, .game-card.logged::before { opacity:1; }
    .pill { display:inline-flex; align-items:center; padding:2px 7px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; white-space:nowrap; }
    .tab-btn { background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; padding:7px 14px; border-radius:6px; transition:background 0.15s, color 0.15s; }
    .tab-btn.active { background:#252A3A; color:#E8EAF0; }
    .tab-btn:not(.active) { color:#8B95A8; }
    .tab-btn:hover:not(.active) { color:#B0B8C8; }
    .filter-btn { background:#1C2030; border:1px solid #252A3A; color:#8B95A8; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:500; padding:4px 9px; border-radius:4px; text-transform:uppercase; letter-spacing:0.05em; transition:all 0.15s; white-space:nowrap; }
    .filter-btn.active { background:#7A6340; border-color:#C8A96E; color:#C8A96E; }
    .filter-btn:hover:not(.active) { border-color:#8B95A8; color:#B0B8C8; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:24px; animation:fadeIn 0.15s ease; }
    .modal-box { background:#1C2030; border:1px solid #252A3A; border-radius:12px; width:100%; max-width:480px; padding:26px; animation:slideUp 0.2s ease; max-height:90vh; overflow-y:auto; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .star-btn { background:none; border:none; cursor:pointer; font-size:24px; padding:2px; transition:transform 0.1s; line-height:1; }
    .star-btn:hover { transform:scale(1.2); }
    .close-btn { background:#252A3A; border:none; color:#8B95A8; cursor:pointer; width:28px; height:28px; border-radius:50%; font-size:18px; display:flex; align-items:center; justify-content:center; transition:color 0.15s; flex-shrink:0; }
    .close-btn:hover { color:#E8EAF0; }
    .log-btn { border:none; border-radius:6px; cursor:pointer; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; padding:9px 18px; transition:all 0.15s; }
    .cover-wrap { width:54px; height:72px; border-radius:5px; flex-shrink:0; background:#252A3A; overflow:hidden; border:1px solid #252A3A; }
    .cover-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .skeleton { background:linear-gradient(90deg,#1C2030 25%,#252A3A 50%,#1C2030 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:5px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .loading-dot { width:7px; height:7px; border-radius:50%; background:#C8A96E; animation:pulse 1.4s ease-in-out infinite; display:inline-block; }
    .loading-dot:nth-child(2){animation-delay:0.2s;}
    .loading-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes pulse{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
    @media(max-width:600px){ .date-day{font-size:42px !important;} .date-col{width:58px !important;padding-right:12px !important;} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
 
    const PLAT = {
      "PS5":                    {bg:"#00439C22",color:"#4A9EFF",border:"#00439C"},
      "PS4":                    {bg:"#00439C15",color:"#3A7EDF",border:"#003080"},
      "Xbox Series X|S":        {bg:"#10772222",color:"#5DC15D",border:"#107722"},
      "Xbox One":               {bg:"#10772215",color:"#4DA14D",border:"#0A5A1A"},
      "PC (Microsoft Windows)": {bg:"#1B1B2F",  color:"#9580C8",border:"#4A3A7A"},
      "Nintendo Switch 2":      {bg:"#C8001422",color:"#FF6B7A",border:"#C80014"},
      "Nintendo Switch":        {bg:"#C8001415",color:"#DF5A66",border:"#900010"},
      "iOS":                    {bg:"#2A1A0022",color:"#C8A96E",border:"#7A6340"},
      "Android":                {bg:"#1A2A1022",color:"#7AC85D",border:"#3A6020"},
    };
    const SHORT = {
      "PC (Microsoft Windows)":"PC",
      "Xbox Series X|S":"Xbox",
      "Nintendo Switch 2":"Switch 2",
      "Nintendo Switch":"Switch",
    };
    const getPlatStyle = p => PLAT[p] || {bg:"#1C203088",color:"#8B95A8",border:"#252A3A"};
    const shortPlat = p => SHORT[p] || p;
 
    async function fetchUpcomingGames() {
      const now    = Math.floor(Date.now() / 1000);
      const future = now + 90 * 86400;
      const query  = 'fields name, cover.image_id, first_release_date, platforms.name, genres.name, involved_companies.company.name, involved_companies.developer, summary, hypes; where first_release_date >= ' + now + ' & first_release_date <= ' + future + ' & cover.image_id != null & platforms != null & (category = 0 | category = 2 | category = 4) & version_parent = null; sort hypes desc; limit 40;';
 
      const res = await fetch('/api/igdb', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ endpoint: 'games', query: query }),
      });
 
      const games = await res.json();
      if (!Array.isArray(games)) throw new Error(games && games.error ? games.error : 'Unexpected response: ' + JSON.stringify(games).slice(0, 100));
 
      return games
        .filter(g => g.first_release_date && g.name && g.cover && g.cover.image_id)
        .map(g => ({
          id:          g.id,
          title:       g.name,
          releaseDate: new Date(g.first_release_date * 1000).toISOString().split('T')[0],
          platforms:   (g.platforms||[]).map(p=>p.name).filter(Boolean),
          genres:      (g.genres||[]).map(x=>x.name).filter(Boolean),
          developer:   (g.involved_companies||[]).find(c=>c.developer) ? g.involved_companies.find(c=>c.developer).company.name : 'Unknown',
          description: g.summary || 'No description available.',
          coverUrl:    'https://images.igdb.com/igdb/image/upload/t_cover_big/' + g.cover.image_id + '.jpg',
          hypes:       g.hypes || 0,
        }))
        .sort((a,b) => new Date(a.releaseDate) - new Date(b.releaseDate));
    }
 
    const groupByDate = games => {
      const groups = {};
      games.forEach(g => { if (!groups[g.releaseDate]) groups[g.releaseDate]=[]; groups[g.releaseDate].push(g); });
      return Object.entries(groups).sort(([a],[b]) => new Date(a)-new Date(b));
    };
    const fmtDay   = d => new Date(d).getUTCDate();
    const fmtMonth = d => new Date(d).toLocaleDateString('en-GB',{month:'short',timeZone:'UTC'}).toUpperCase();
    const daysAway = d => {
      const diff = Math.round((new Date(d)-Date.now())/86400000);
      if (diff<=0) return 'Today';
      if (diff===1) return 'Tomorrow';
      if (diff<7)  return diff+'d away';
      if (diff<14) return 'Next week';
      return Math.ceil(diff/7)+'w away';
    };
 
    const Cover = ({url, title}) => {
      const [err, setErr] = useState(false);
      const initials = title.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
      return (
        <div className="cover-wrap">
          {url && !err
            ? <img src={url} alt={title} onError={()=>setErr(true)}/>
            : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(145deg,#1a1a30,#252545)'}}>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:'#C8A96E'}}>{initials}</span>
              </div>
          }
        </div>
      );
    };
 
    const LogModal = ({game, existing, onSave, onClose}) => {
      const [rating, setRating] = useState(existing ? existing.rating : 0);
      const [status, setStatus] = useState(existing ? existing.status : 'want');
      const [note,   setNote]   = useState(existing ? existing.note   : '');
      const statuses = [{id:'want',label:'Want to play',icon:'🎯'},{id:'playing',label:'Playing',icon:'🎮'},{id:'played',label:'Played',icon:'✓'},{id:'dropped',label:'Dropped',icon:'✕'}];
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,gap:12}}>
              <div>
                <p className="mono" style={{color:'#8B95A8',fontSize:10,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>Log entry</p>
                <h2 style={{fontSize:17,fontWeight:600,color:'#E8EAF0',lineHeight:1.3}}>{game.title}</h2>
              </div>
              <button className="close-btn" onClick={onClose}>×</button>
            </div>
            <p className="mono" style={{color:'#8B95A8',fontSize:10,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Status</p>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:20}}>
              {statuses.map(s=>(
                <button key={s.id} onClick={()=>setStatus(s.id)} style={{background:status===s.id?'#7A6340':'#252A3A',border:'1px solid '+(status===s.id?'#C8A96E':'transparent'),color:status===s.id?'#C8A96E':'#B0B8C8',borderRadius:6,padding:'6px 12px',fontSize:13,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',gap:6,transition:'all 0.15s'}}>{s.icon} {s.label}</button>
              ))}
            </div>
            <p className="mono" style={{color:'#8B95A8',fontSize:10,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Rating {rating>0 && <span style={{color:'#C8A96E'}}>— {rating}/5</span>}</p>
            <div style={{display:'flex',gap:6,marginBottom:20}}>
              {[1,2,3,4,5].map(n=>(
                <button key={n} className="star-btn" onClick={()=>setRating(rating===n?0:n)}>
                  <span style={{color:n<=rating?'#C8A96E':'#2e3550'}}>{n<=rating?'★':'☆'}</span>
                </button>
              ))}
            </div>
            <p className="mono" style={{color:'#8B95A8',fontSize:10,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Notes</p>
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="What did you think?" rows={3} style={{width:'100%',background:'#252A3A',border:'1px solid #2e3550',borderRadius:6,color:'#E8EAF0',fontFamily:"'Inter',sans-serif",fontSize:13,padding:'9px 12px',resize:'vertical',outline:'none',lineHeight:1.5,marginBottom:20}}/>
            <div style={{display:'flex',gap:8}}>
              <button className="log-btn" onClick={()=>onSave({rating,status,note})} style={{flex:1,background:'#C8A96E',color:'#0F1117'}}>Save</button>
              {existing && <button className="log-btn" onClick={()=>onSave(null)} style={{background:'#252A3A',color:'#8B95A8',border:'1px solid #252A3A'}}>Remove</button>}
            </div>
          </div>
        </div>
      );
    };
 
    const GameCard = ({game, logEntry, onLogClick}) => {
      const [expanded, setExpanded] = useState(false);
      return (
        <div className={'game-card'+(logEntry?' logged':'')} onClick={()=>setExpanded(!expanded)}>
          <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
            <Cover url={game.coverUrl} title={game.title}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                <h3 style={{fontSize:14,fontWeight:600,color:'#E8EAF0',lineHeight:1.3}}>{game.title}</h3>
                {logEntry && logEntry.rating>0 && <span style={{color:'#C8A96E',fontSize:12}}>{'★'.repeat(logEntry.rating)}</span>}
              </div>
              <p style={{fontSize:12,color:'#8B95A8',marginBottom:8}}>{game.developer}</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {game.platforms.slice(0,4).map(p=>{const s=getPlatStyle(p);return <span key={p} className="pill" style={{background:s.bg,color:s.color,border:'1px solid '+s.border}}>{shortPlat(p)}</span>;})}
                {game.genres.slice(0,2).map(g=><span key={g} className="pill" style={{background:'transparent',color:'#8B95A8',border:'1px solid #252A3A'}}>{g}</span>)}
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6,flexShrink:0}}>
              {game.hypes>0 && <div style={{background:'#C8A96E18',border:'1px solid #7A6340',borderRadius:4,padding:'2px 7px',fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:'#C8A96E',letterSpacing:'0.04em'}}>🔥 {game.hypes}</div>}
              {logEntry && <span className="pill" style={{background:'#5DA67A22',color:'#5DA67A',border:'1px solid #5DA67A44'}}>{logEntry.status==='want'?'🎯 Want':logEntry.status==='playing'?'🎮 Playing':logEntry.status==='played'?'✓ Played':'✕ Dropped'}</span>}
            </div>
          </div>
          {expanded && (
            <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid #252A3A'}}>
              <p style={{fontSize:13,color:'#B0B8C8',lineHeight:1.65,marginBottom:14}}>{game.description}</p>
              {logEntry && logEntry.note && <p style={{fontSize:12,color:'#8B95A8',fontStyle:'italic',marginBottom:14,paddingLeft:10,borderLeft:'2px solid #7A6340'}}>"{logEntry.note}"</p>}
              <button className="log-btn" onClick={e=>{e.stopPropagation();onLogClick(game);}} style={{background:logEntry?'#252A3A':'#C8A96E',color:logEntry?'#E8EAF0':'#0F1117',border:logEntry?'1px solid #7A6340':'none',fontSize:12,padding:'7px 14px'}}>
                {logEntry?'Edit log':'+ Log this game'}
              </button>
            </div>
          )}
        </div>
      );
    };
 
    const SkeletonGroup = () => (
      <div style={{display:'flex',gap:0,marginBottom:36}}>
        <div style={{width:72,flexShrink:0,paddingRight:16,paddingTop:4}}>
          <div className="skeleton" style={{width:44,height:54,marginBottom:6}}/>
          <div className="skeleton" style={{width:28,height:10}}/>
        </div>
        <div style={{width:1,background:'#252A3A',flexShrink:0,marginRight:20,marginTop:8}}/>
        <div style={{flex:1}}>
          {[0,1].map(i=>(
            <div key={i} style={{background:'#1C2030',borderRadius:8,padding:14,marginBottom:10}}>
              <div style={{display:'flex',gap:12}}>
                <div className="skeleton" style={{width:54,height:72,borderRadius:5,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div className="skeleton" style={{width:'55%',height:14,marginBottom:8}}/>
                  <div className="skeleton" style={{width:'30%',height:11,marginBottom:12}}/>
                  <div style={{display:'flex',gap:4}}>
                    <div className="skeleton" style={{width:42,height:18,borderRadius:4}}/>
                    <div className="skeleton" style={{width:42,height:18,borderRadius:4}}/>
                    <div className="skeleton" style={{width:58,height:18,borderRadius:4}}/>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
 
    function App() {
      const [games,      setGames]      = useState([]);
      const [loading,    setLoading]    = useState(true);
      const [error,      setError]      = useState(null);
      const [logs,       setLogs]       = useState({});
      const [modalGame,  setModalGame]  = useState(null);
      const [tab,        setTab]        = useState('upcoming');
      const [platFilter, setPlatFilter] = useState(null);
 
      useEffect(()=>{
        fetchUpcomingGames()
          .then(setGames)
          .catch(e=>setError(e.message))
          .finally(()=>setLoading(false));
      },[]);
 
      const allPlatforms = [...new Set(games.flatMap(g=>g.platforms))].sort();
      const visible = games.filter(g=>{
        if (platFilter && !g.platforms.includes(platFilter)) return false;
        if (tab==='logged') return !!logs[g.id];
        return true;
      });
      const grouped  = groupByDate(visible);
      const logCount = Object.keys(logs).length;
 
      const saveLog = (game,entry) => {
        setLogs(prev=>{ const next={...prev}; if(entry===null) delete next[game.id]; else next[game.id]=entry; return next; });
        setModalGame(null);
      };
 
      return (
        <div>
          <nav style={{position:'sticky',top:0,zIndex:50,background:'#0F1117f0',backdropFilter:'blur(12px)',borderBottom:'1px solid #252A3A',padding:'0 24px'}}>
            <div style={{maxWidth:780,margin:'0 auto',display:'flex',alignItems:'center',height:54,gap:12}}>
              <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                <span className="bebas" style={{fontSize:24,color:'#C8A96E',letterSpacing:'0.06em',lineHeight:1}}>LOADOUT</span>
                <span className="mono" style={{fontSize:9,color:'#8B95A8',textTransform:'uppercase',letterSpacing:'0.12em'}}>releases</span>
              </div>
              <div style={{flex:1}}/>
              <div style={{display:'flex',gap:2}}>
                <button className={'tab-btn'+(tab==='upcoming'?' active':'')} onClick={()=>setTab('upcoming')}>Upcoming</button>
                <button className={'tab-btn'+(tab==='logged'?' active':'')} onClick={()=>setTab('logged')}>
                  My Log {logCount>0 && <span style={{background:'#C8A96E',color:'#0F1117',borderRadius:10,padding:'1px 6px',fontSize:11,fontWeight:700,marginLeft:4}}>{logCount}</span>}
                </button>
              </div>
            </div>
          </nav>
 
          {!loading && !error && allPlatforms.length>0 && (
            <div style={{borderBottom:'1px solid #252A3A',padding:'8px 24px',overflowX:'auto'}}>
              <div style={{maxWidth:780,margin:'0 auto',display:'flex',gap:5,alignItems:'center',minWidth:'max-content'}}>
                <span className="mono" style={{fontSize:10,color:'#8B95A8',textTransform:'uppercase',letterSpacing:'0.08em',marginRight:4}}>Platform</span>
                <button className={'filter-btn'+(!platFilter?' active':'')} onClick={()=>setPlatFilter(null)}>All</button>
                {allPlatforms.map(p=><button key={p} className={'filter-btn'+(platFilter===p?' active':'')} onClick={()=>setPlatFilter(platFilter===p?null:p)}>{shortPlat(p)}</button>)}
              </div>
            </div>
          )}
 
          <main style={{maxWidth:780,margin:'0 auto',padding:'32px 24px 80px'}}>
            {loading && (
              <div>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:32}}>
                  <div style={{display:'flex',gap:5}}><div className="loading-dot"/><div className="loading-dot"/><div className="loading-dot"/></div>
                  <span className="mono" style={{fontSize:11,color:'#8B95A8',letterSpacing:'0.06em'}}>Fetching upcoming releases…</span>
                </div>
                {[0,1,2].map(i=><SkeletonGroup key={i}/>)}
              </div>
            )}
            {error && (
              <div style={{textAlign:'center',padding:'60px 24px'}}>
                <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
                <p className="mono" style={{color:'#C86E6E',fontSize:12,marginBottom:8}}>Failed to load games</p>
                <p style={{color:'#8B95A8',fontSize:13}}>{error}</p>
              </div>
            )}
            {!loading && !error && tab==='logged' && logCount===0 && (
              <div style={{textAlign:'center',padding:'80px 24px',color:'#8B95A8'}}>
                <div style={{fontSize:48,marginBottom:16}}>🎮</div>
                <p style={{fontSize:16,fontWeight:500,marginBottom:8,color:'#B0B8C8'}}>Nothing logged yet</p>
                <p style={{fontSize:13}}>Switch to Upcoming, expand any game, and hit "Log this game".</p>
              </div>
            )}
            {!loading && !error && tab==='upcoming' && grouped.length===0 && (
              <div style={{textAlign:'center',padding:'80px 24px',color:'#8B95A8'}}>
                <div style={{fontSize:48,marginBottom:16}}>📅</div>
                <p style={{fontSize:16,fontWeight:500,marginBottom:8,color:'#B0B8C8'}}>No upcoming releases found</p>
                <p style={{fontSize:13}}>IGDB may not have data for this window yet.</p>
              </div>
            )}
            {grouped.map(([dateKey,dayGames],idx)=>(
              <div key={dateKey} style={{display:'flex',gap:0,marginBottom:36}}>
                <div className="date-col" style={{width:72,flexShrink:0,paddingRight:16,paddingTop:2}}>
                  <div className="bebas date-day" style={{fontSize:54,lineHeight:1,color:idx===0?'#C8A96E':'#B0B8C8',letterSpacing:'0.02em'}}>{fmtDay(dateKey)}</div>
                  <div className="mono" style={{fontSize:10,color:'#8B95A8',textTransform:'uppercase',letterSpacing:'0.1em',marginTop:2}}>{fmtMonth(dateKey)}</div>
                  <div className="mono" style={{fontSize:9,color:idx===0?'#C8A96E':'#8B95A8',marginTop:4,letterSpacing:'0.04em'}}>{daysAway(dateKey)}</div>
                </div>
                <div style={{width:1,background:'#252A3A',flexShrink:0,marginRight:20,marginTop:8}}/>
                <div style={{flex:1,minWidth:0}}>
                  {dayGames.map(game=><GameCard key={game.id} game={game} logEntry={logs[game.id]} onLogClick={setModalGame}/>)}
                </div>
              </div>
            ))}
          </main>
          {modalGame && <LogModal game={modalGame} existing={logs[modalGame.id]} onSave={entry=>saveLog(modalGame,entry)} onClose={()=>setModalGame(null)}/>}
        </div>
      );
    }
 
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
